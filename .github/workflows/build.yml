name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ────────────────────────────────────────────
  # Lint & Typecheck (runs once, fast feedback)
  # ────────────────────────────────────────────
  quality:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Typecheck
        run: |
          npx tsc --noEmit -p tsconfig.node.json --composite false
          npx tsc --noEmit -p tsconfig.web.json --composite false

      - name: Test
        run: npm test

      - name: Lint
        run: npx eslint src/

  # ────────────────────────────────────────────
  # Build for all platforms
  # ────────────────────────────────────────────
  build:
    name: Build (${{ matrix.label }})
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS
            platform: mac

          - os: windows-latest
            label: Windows
            platform: win

          - os: ubuntu-22.04
            label: Linux
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Linux: install native build dependencies
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 make rpm fakeroot libfuse2 snapcraft

      # Windows: disable Defender real-time protection to prevent rcedit lock
      - name: Disable Windows Defender real-time protection
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Set-MpPreference -DisableRealtimeMonitoring $true
          Add-MpPreference -ExclusionPath "${{ github.workspace }}"

      # Install project dependencies
      - name: Install dependencies
        run: npm ci

      # Vite build (compile TypeScript + bundle renderer)
      - name: Vite build
        run: npx electron-vite build

      # Package with electron-builder (no code signing without certs)
      - name: Package
        run: npx electron-builder --${{ matrix.platform }} --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Disable auto code signing discovery (sign only when secrets are set)
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      # List built artifacts for debugging
      - name: List dist
        run: ls -la dist/
        shell: bash

      # Upload artifacts (only installers, no yml/blockmap)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}-artifacts
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.snap
          if-no-files-found: warn
          retention-days: 30

  # ────────────────────────────────────────────
  # Create GitHub Release (only on tag push)
  # ────────────────────────────────────────────
  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Download all platform artifacts
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List all artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.snap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
