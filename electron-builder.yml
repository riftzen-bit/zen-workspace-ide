appId: com.zen.workspace
productName: 'Zen Workspace'
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
  - node_modules/node-pty/**
npmRebuild: true
win:
  executableName: 'zen-workspace'
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
dmg:
  artifactName: ${name}-${version}-${arch}.${ext}
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
    - target: rpm
      arch:
        - x64
    - target: snap
      arch:
        - x64
  maintainer: riftzen-bit
  category: Development
  executableName: zen-workspace
  synopsis: An isolated, distraction-free command center and elite coding assistant.
  description: >
    Orchestrate multiple AI CLI agents side-by-side with peak performance.
    Features integrated terminal, AI chat, code editor, and media player.
appImage:
  artifactName: ${name}-${version}-${arch}.${ext}
deb:
  artifactName: ${name}-${version}-${arch}.${ext}
  depends:
    - libnotify4
    - libxtst6
    - libnss3
rpm:
  artifactName: ${name}-${version}-${arch}.${ext}
snap:
  artifactName: ${name}-${version}-${arch}.${ext}
  plugs:
    - default
    - home
    - removable-media
publish:
  provider: github
  owner: riftzen-bit
  repo: zen-workspace-ide
